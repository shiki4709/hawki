<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 260px; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 13px; color: #333; }
    h1 { font-size: 16px; margin: 0 0 12px; }
    .status { padding: 8px 12px; border-radius: 6px; margin-bottom: 12px; }
    .status-ok { background: #e8f5e9; color: #2e7d32; }
    .status-err { background: #fff3e0; color: #e65100; }
    .status-off { background: #f5f5f5; color: #999; }
    .time { font-size: 11px; color: #999; margin-top: 4px; }
    button { width: 100%; padding: 8px; font-size: 13px; font-weight: 600; border: none; border-radius: 6px; cursor: pointer; background: #1a73e8; color: white; }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <h1>Hawki</h1>
  <div id="status" class="status status-off">Checking...</div>
  <button id="sync-btn" onclick="manualSync()">Sync Now</button>
  <script src="popup.js"></script>
</body>
</html>
