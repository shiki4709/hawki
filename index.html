<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Hawki — Find & engage your next leads</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="page">

  <!-- ── Top bar: always visible ── -->
  <header class="topbar">
    <div class="topbar-left">
      <h1 class="topbar-title">Hawki</h1>
      <span class="topbar-sprint" id="sprint-label" onclick="editSprint()"></span>
      <div class="topbar-mode" id="mode-toggle"></div>
    </div>
    <div class="topbar-right">
      <button class="settings-btn" onclick="openSettings()" title="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
    </div>
  </header>

  <!-- ── View tabs ── -->
  <nav class="view-tabs" id="view-tabs"></nav>

  <!-- ── Views ── -->
  <main id="view-home" class="view"></main>
  <main id="view-experiment" class="view"></main>
  <main id="view-integrations" class="view"></main>
  <main id="view-weekly" class="view"></main>
  <main id="view-scrape" class="view"></main>

  <div class="save-notice" id="saved">Saved</div>

  <!-- ── Quick-Add Modal ── -->
  <div class="modal-overlay" id="modal">
    <div class="chat"></div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/data.js"></script>
<script src="js/store.js"></script>
<script src="js/benchmarks.js"></script>
<script src="js/sync.js"></script>
<script src="js/edit.js"></script>
<script src="js/board.js"></script>
<script src="js/weeks.js"></script>
<script src="js/scrape.js"></script>
<script src="js/chat.js"></script>
<script src="js/app.js"></script>

</body>
</html>
