<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GTM Hypothesis Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fafafa; color: #111;
      max-width: 860px; margin: 0 auto; padding: 32px 24px;
    }

    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
    .header h1 { font-size: 20px; font-weight: 700; }
    .header .sub { font-size: 12px; color: #999; }
    .add-btn {
      background: #111; color: #fff; border: none;
      padding: 8px 16px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer;
    }

    .week-label {
      font-size: 11px; font-weight: 600; color: #aaa; text-transform: uppercase;
      letter-spacing: 0.5px; margin: 24px 0 8px;
    }

    .exp {
      background: #fff; border: 1px solid #eee; border-radius: 8px;
      padding: 14px 16px; margin-bottom: 6px;
    }
    .exp.queued { opacity: 0.35; }
    .exp.highlight { border-color: #3b82f6; animation: hl 2s ease-out forwards; }
    @keyframes hl { to { border-color: #eee; } }

    .exp-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
    }

    .exp-name { font-weight: 600; font-size: 13px; }
    .exp-channel { font-size: 11px; color: #999; }

    .exp-right { display: flex; align-items: center; gap: 10px; }

    .kpi-pills { display: flex; gap: 6px; flex-wrap: wrap; }
    .kpi-pill {
      font-size: 11px; font-weight: 600;
      padding: 2px 8px; border-radius: 4px;
      background: #f3f4f6; color: #555;
    }
    .kpi-pill.good { background: #d1fae5; color: #065f46; }
    .kpi-pill.bad { background: #fee2e2; color: #991b1b; }
    .kpi-pill.ok { background: #fef3c7; color: #92400e; }

    .badge {
      font-size: 10px; font-weight: 700; padding: 3px 8px;
      border-radius: 10px; white-space: nowrap;
    }
    .badge.yes { background: #d1fae5; color: #065f46; }
    .badge.weak { background: #fef3c7; color: #92400e; }
    .badge.early { background: #e0e7ff; color: #3730a3; }
    .badge.queued-b { background: #f3f4f6; color: #bbb; }
    .badge.no { background: #fee2e2; color: #991b1b; }

    .exp-verdict {
      font-size: 11px; color: #777; margin-top: 6px;
      padding-top: 6px; border-top: 1px solid #f5f5f5;
    }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4); z-index: 100; justify-content: center; align-items: center;
    }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 12px; padding: 24px; width: 500px; max-width: 90vw; }
    .modal h2 { font-size: 16px; margin-bottom: 12px; }
    .modal textarea {
      width: 100%; height: 160px; border: 1px solid #ddd; border-radius: 6px;
      padding: 10px; font-size: 12px; font-family: monospace; outline: none; resize: vertical;
    }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px; }
    .btn { padding: 8px 16px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; }
    .btn-p { background: #111; color: #fff; }
    .btn-s { background: #f3f4f6; color: #555; }
    .parse-msg { font-size: 11px; margin-top: 6px; }
    .parse-msg.error { color: #dc2626; display: none; }
    .parse-msg.success { color: #059669; display: none; }

    @media (max-width: 600px) {
      .exp-row { grid-template-columns: 1fr; }
      .exp-right { justify-content: flex-start; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div>
      <h1>Nevara GTM</h1>
      <div class="sub">Week 1 — Mar 24, 2026</div>
    </div>
    <button class="add-btn" onclick="openModal()">+ Add from Bot</button>
  </div>

  <div id="list"></div>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h2>Paste bot output</h2>
      <textarea id="bot-input" placeholder="Idea: ...&#10;Hypothesis: ...&#10;KPI: ...&#10;This week's test: ..."></textarea>
      <div class="parse-msg error" id="pe">Needs at least an Idea line.</div>
      <div class="parse-msg success" id="ps">Added!</div>
      <div class="modal-actions">
        <button class="btn btn-s" onclick="closeModal()">Cancel</button>
        <button class="btn btn-p" onclick="addFromBot()">Add</button>
      </div>
    </div>
  </div>

<script>
const K = 'gtm_v3';

const DEFAULTS = [
  { id:1, name:"LinkedIn — Signal-Based (Clay)", ch:"LinkedIn", wk:1, st:"done",
    kpis:[{l:"Accept",v:"41%",s:"good"},{l:"Reply",v:"24.6%",s:"good"},{l:"Demos",v:"3",s:"neutral"}],
    sig:"yes", verdict:"Winner. Hiring signals produce highest-intent leads." },
  { id:2, name:"LinkedIn — Post-Engagement", ch:"LinkedIn", wk:1, st:"done",
    kpis:[{l:"Accept",v:"38%",s:"good"},{l:"Reply",v:"21.5%",s:"good"},{l:"Demos",v:"3",s:"neutral"}],
    sig:"yes", verdict:"Strong. Run alongside signal-based." },
  { id:3, name:"LinkedIn — Deal-Context", ch:"LinkedIn", wk:1, st:"done",
    kpis:[{l:"Accept",v:"30%",s:"ok"},{l:"Reply",v:"17.1%",s:"ok"},{l:"Demos",v:"2",s:"neutral"}],
    sig:"weak", verdict:"Weakest variant. Deprioritize." },
  { id:4, name:"Post-Engager List — Commenters", ch:"Content Mining", wk:1, st:"done",
    kpis:[{l:"ICP Match",v:"38%",s:"good"},{l:"Reply",v:"23.5%",s:"good"},{l:"Demos",v:"3",s:"neutral"}],
    sig:"yes", verdict:"Highest intent. Run on 5 more posts." },
  { id:5, name:"Post-Engager List — Likers", ch:"Content Mining", wk:1, st:"done",
    kpis:[{l:"ICP Match",v:"12%",s:"ok"},{l:"Reply",v:"9.1%",s:"bad"},{l:"Demos",v:"1",s:"neutral"}],
    sig:"weak", verdict:"Cut. Commenters are 3x better." },
  { id:6, name:"Coffee at Sales Meetup", ch:"Events", wk:1, st:"done",
    kpis:[{l:"Convos",v:"40",s:"neutral"},{l:"Emails",v:"18",s:"neutral"},{l:"Demos",v:"6",s:"good"},{l:"$/Demo",v:"$25",s:"good"}],
    sig:"yes", verdict:"Highest conversion. Book 2/month." },
  { id:7, name:"Reddit Listening — r/sales", ch:"Reddit", wk:1, st:"running",
    kpis:[{l:"Replies",v:"20",s:"neutral"},{l:"Reply-backs",v:"4",s:"neutral"},{l:"Rate",v:"20%",s:"good"}],
    sig:"early", verdict:"Building presence. 60-day play." },
  { id:8, name:"Twitter Listening", ch:"Twitter", wk:1, st:"running",
    kpis:[{l:"Replies",v:"15",s:"neutral"},{l:"Reply-backs",v:"2",s:"neutral"},{l:"Rate",v:"13%",s:"ok"}],
    sig:"early", verdict:"Lower than Reddit. Reduce effort." },
  { id:9, name:"Referral Post DMs", ch:"LinkedIn", wk:2, st:"queued", kpis:[], sig:null, verdict:null },
  { id:10, name:"Influencer Monitoring", ch:"LinkedIn", wk:2, st:"queued", kpis:[], sig:null, verdict:null },
  { id:11, name:"Warm Intros", ch:"LinkedIn", wk:2, st:"queued", kpis:[], sig:null, verdict:null },
  { id:12, name:"Personalized + $5 Gift", ch:"LinkedIn", wk:2, st:"queued", kpis:[], sig:null, verdict:null },
  { id:13, name:"Churned User Re-Engagement", ch:"Email", wk:3, st:"queued", kpis:[], sig:null, verdict:null },
  { id:14, name:"Twitter Presence Building", ch:"Twitter", wk:3, st:"queued", kpis:[], sig:null, verdict:null },
];

function load() { const s=localStorage.getItem(K); if(s) return JSON.parse(s); save(DEFAULTS); return DEFAULTS; }
function save(d) { localStorage.setItem(K, JSON.stringify(d)); }

function render() {
  const exps = load();
  const weeks = {};
  exps.forEach(e => { const w = 'Week '+e.wk; if(!weeks[w]) weeks[w]=[]; weeks[w].push(e); });

  let html = '';
  for (const [wk, list] of Object.entries(weeks)) {
    html += `<div class="week-label">${wk}</div>`;
    html += list.map(e => {
      const q = e.st === 'queued';
      const badge = e.sig
        ? `<span class="badge ${e.sig}">${e.sig==='yes'?'YES':e.sig==='weak'?'WEAK':e.sig==='early'?'EARLY':e.sig.toUpperCase()}</span>`
        : e.st==='running' ? '<span class="badge early">RUNNING</span>'
        : '<span class="badge queued-b">QUEUED</span>';

      const pills = e.kpis.map(k =>
        `<span class="kpi-pill ${k.s}">${k.l}: ${k.v}</span>`
      ).join('');

      return `
        <div class="exp ${q?'queued':''}" id="exp-${e.id}">
          <div class="exp-row">
            <div>
              <span class="exp-name">${e.name}</span>
              <span class="exp-channel">${e.ch}</span>
            </div>
            <div class="exp-right">
              <div class="kpi-pills">${pills}</div>
              ${badge}
            </div>
          </div>
          ${e.verdict ? `<div class="exp-verdict">${e.verdict}</div>` : ''}
        </div>`;
    }).join('');
  }
  document.getElementById('list').innerHTML = html;
}

// Modal
function openModal() { document.getElementById('modal').classList.add('open'); document.getElementById('bot-input').value=''; document.getElementById('pe').style.display='none'; document.getElementById('ps').style.display='none'; }
function closeModal() { document.getElementById('modal').classList.remove('open'); }

function addFromBot() {
  const t = document.getElementById('bot-input').value;
  const r = {};
  t.split('\n').forEach(l => {
    const s = l.replace(/\*\*/g,'').trim();
    if(/^idea:/i.test(s)) r.name=s.replace(/^idea:\s*/i,'');
    else if(/^hypothesis:/i.test(s)) r.hyp=s.replace(/^hypothesis:\s*/i,'');
    else if(/^kpi:/i.test(s)) r.kpi=s.replace(/^kpi:\s*/i,'');
    else if(/^this week/i.test(s)) r.test=s.replace(/^this week'?s? test:\s*/i,'');
  });
  if(!r.name){document.getElementById('pe').style.display='block';document.getElementById('ps').style.display='none';return;}

  const exps=load();
  const id=exps.reduce((m,e)=>Math.max(m,e.id),0)+1;
  exps.push({
    id, name:r.name, ch:"New", wk:2, st:"queued",
    kpis: r.kpi ? [{l:"Target",v:"pending",s:"neutral"}] : [],
    sig:null, verdict: r.test || null
  });
  save(exps);
  document.getElementById('pe').style.display='none';
  document.getElementById('ps').style.display='block';
  setTimeout(()=>{ closeModal(); render(); setTimeout(()=>{
    const c=document.getElementById('exp-'+id);
    if(c){c.classList.add('highlight');c.scrollIntoView({behavior:'smooth',block:'center'});}
  },100);},400);
}

document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

render();
</script>
</body>
</html>
