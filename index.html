<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Nevara GTM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ================================================================
       DESIGN SYSTEM — Lab Notebook
       A hypothesis sprint board that feels like a researcher's
       personal notebook: warm, structured, precise.
       ================================================================ */

    /* --- Tokens: Spacing (4pt base) --- */
    :root {
      --s-2: 2px;
      --s-4: 4px;
      --s-6: 6px;
      --s-8: 8px;
      --s-12: 12px;
      --s-16: 16px;
      --s-20: 20px;
      --s-24: 24px;
      --s-32: 32px;
      --s-48: 48px;
      --s-64: 64px;
    }

    /* --- Tokens: Color (OKLCH, tinted neutrals toward warm hue 55) --- */
    :root {
      --bg:         oklch(97.2% 0.008 55);
      --bg-sub:     oklch(95% 0.008 55);
      --surface:    oklch(93% 0.010 55);
      --rule:       oklch(88% 0.012 55);
      --rule-faint: oklch(91% 0.008 55);

      --text:       oklch(25% 0.015 55);
      --text-2:     oklch(42% 0.012 55);
      --text-3:     oklch(58% 0.010 55);
      --text-4:     oklch(70% 0.008 55);

      --accent:     oklch(52% 0.16 28);
      --accent-bg:  oklch(94% 0.025 28);
      --accent-hover: oklch(48% 0.17 28);

      --hit:        oklch(48% 0.10 155);
      --hit-bg:     oklch(94% 0.025 155);
      --change:     oklch(55% 0.12 65);
      --change-bg:  oklch(94% 0.025 65);
      --close:      oklch(52% 0.08 85);
      --close-bg:   oklch(93% 0.02 85);
      --muted:      oklch(62% 0.008 55);
      --muted-bg:   oklch(93% 0.006 55);
    }

    /* --- Tokens: Typography --- */
    :root {
      --ff-body: 'Instrument Sans', sans-serif;
      --ff-display: 'Newsreader', Georgia, serif;

      --fs-xs:   clamp(0.6875rem, 0.65rem + 0.15vw, 0.75rem);
      --fs-sm:   clamp(0.75rem, 0.7rem + 0.2vw, 0.8125rem);
      --fs-base: clamp(0.8125rem, 0.77rem + 0.2vw, 0.875rem);
      --fs-md:   clamp(0.9375rem, 0.88rem + 0.25vw, 1rem);
      --fs-lg:   clamp(1.125rem, 1rem + 0.5vw, 1.25rem);
      --fs-xl:   clamp(1.5rem, 1.2rem + 1.2vw, 2rem);
      --fs-hero: clamp(2.75rem, 2rem + 3vw, 4rem);

      --lh-tight: 1.15;
      --lh-body:  1.55;
    }

    /* --- Tokens: Motion --- */
    :root {
      --ease-out: cubic-bezier(0.25, 1, 0.5, 1);
      --ease-in:  cubic-bezier(0.7, 0, 0.84, 0);
      --ease-io:  cubic-bezier(0.65, 0, 0.35, 1);
      --dur-fast: 120ms;
      --dur-mid:  220ms;
      --dur-slow: 360ms;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* --- Reset --- */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--ff-body);
      font-size: var(--fs-base);
      line-height: var(--lh-body);
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      font-kerning: normal;
    }

    /* --- Page Shell --- */
    .page {
      max-width: 52rem;
      margin: 0 auto;
      padding: clamp(var(--s-24), 4vw, var(--s-48)) clamp(var(--s-16), 3vw, var(--s-32)) var(--s-64);
    }

    /* --- Header --- */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: var(--s-16);
      margin-bottom: var(--s-48);
    }

    .header-title {
      font-family: var(--ff-display);
      font-size: var(--fs-xl);
      font-weight: 500;
      line-height: var(--lh-tight);
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .header-sub {
      font-size: var(--fs-xs);
      color: var(--text-3);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 600;
      margin-top: var(--s-4);
    }

    .add-btn {
      font-family: var(--ff-body);
      font-size: var(--fs-sm);
      font-weight: 600;
      color: var(--accent);
      background: transparent;
      border: 1.5px solid var(--rule);
      padding: var(--s-8) var(--s-16);
      border-radius: var(--s-4);
      cursor: pointer;
      transition: border-color var(--dur-fast) var(--ease-out),
                  background var(--dur-fast) var(--ease-out);
      white-space: nowrap;
    }
    .add-btn:hover {
      border-color: var(--accent);
      background: var(--accent-bg);
    }
    .add-btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .add-btn:active { transform: scale(0.97); }

    /* --- Sprint Label --- */
    .sprint-label {
      font-family: var(--ff-display);
      font-size: var(--fs-md);
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .sprint-dates {
      font-size: var(--fs-xs);
      color: var(--text-4);
      margin-top: var(--s-2);
      margin-bottom: var(--s-32);
    }

    /* --- North Star --- */
    .ns {
      margin-bottom: var(--s-48);
    }
    .ns-label {
      font-size: var(--fs-xs);
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .ns-row {
      display: flex;
      align-items: baseline;
      gap: var(--s-12);
      margin-top: var(--s-4);
    }
    .ns-value {
      font-family: var(--ff-display);
      font-size: var(--fs-hero);
      font-weight: 400;
      line-height: 1;
      letter-spacing: -0.03em;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }
    .ns-of {
      font-size: var(--fs-base);
      color: var(--text-4);
    }
    .ns-track {
      height: 3px;
      background: var(--rule);
      border-radius: 1.5px;
      margin-top: var(--s-16);
      max-width: 20rem;
      overflow: hidden;
    }
    .ns-fill {
      height: 100%;
      border-radius: 1.5px;
      transition: width 0.5s var(--ease-out);
    }
    .ns-sub {
      font-size: var(--fs-xs);
      color: var(--text-4);
      margin-top: var(--s-8);
    }

    /* --- Flow Navigation --- */
    .flow-nav {
      display: flex;
      gap: var(--s-6);
      margin-bottom: var(--s-48);
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      padding-bottom: var(--s-4);
    }
    .flow-nav::-webkit-scrollbar { display: none; }

    .flow-tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--s-2);
      padding: var(--s-8) var(--s-16);
      border-radius: var(--s-4);
      cursor: pointer;
      transition: background var(--dur-fast) var(--ease-out);
      user-select: none;
      white-space: nowrap;
      min-width: 5rem;
      border: 1.5px solid transparent;
    }
    .flow-tab:hover {
      background: var(--surface);
    }
    .flow-tab.active {
      background: var(--bg);
      border-color: var(--rule);
    }

    .flow-tab-label {
      font-size: var(--fs-xs);
      font-weight: 600;
      color: var(--text-3);
      letter-spacing: 0.02em;
    }
    .flow-tab.active .flow-tab-label { color: var(--text); }

    .flow-tab-num {
      font-family: var(--ff-display);
      font-size: var(--fs-lg);
      font-weight: 400;
      line-height: 1;
      color: var(--text-4);
      font-variant-numeric: tabular-nums;
    }
    .flow-tab.active .flow-tab-num { color: var(--text); }
    .flow-tab-num.has-data { color: var(--hit); }
    .flow-tab.active .flow-tab-num.has-data { color: var(--hit); }

    .flow-tab-count {
      font-size: var(--fs-xs);
      color: var(--text-4);
      font-variant-numeric: tabular-nums;
    }

    /* --- Platform Section --- */
    .platform {
      margin-bottom: var(--s-64);
    }
    .platform-head {
      display: flex;
      align-items: baseline;
      gap: var(--s-12);
      margin-bottom: var(--s-24);
    }
    .platform-name {
      font-family: var(--ff-display);
      font-size: var(--fs-lg);
      font-weight: 500;
      letter-spacing: -0.01em;
    }
    .platform-meta {
      font-size: var(--fs-xs);
      color: var(--text-4);
    }
    .platform-dot {
      width: 7px;
      height: 7px;
      border-radius: 2px;
      flex-shrink: 0;
      position: relative;
      top: -1px;
    }

    /* --- Experiment List --- */
    .exp-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* Column header */
    .exp-cols {
      display: grid;
      grid-template-columns: 1fr 5.5rem 6rem 5rem 7.5rem;
      gap: var(--s-8);
      padding: 0 0 var(--s-8);
      border-bottom: 1.5px solid var(--rule);
      margin-bottom: var(--s-4);
    }
    .exp-col-label {
      font-size: var(--fs-xs);
      font-weight: 600;
      color: var(--text-4);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .exp-col-label:last-child { text-align: right; }

    /* Single experiment item */
    .exp-item {
      border-bottom: 1px solid var(--rule-faint);
    }
    .exp-item:last-child { border-bottom: 1px solid var(--rule); }

    .exp-row {
      display: grid;
      grid-template-columns: 1fr 5.5rem 6rem 5rem 7.5rem;
      gap: var(--s-8);
      align-items: center;
      padding: var(--s-12) 0;
      cursor: pointer;
      transition: background var(--dur-fast) var(--ease-out);
    }
    .exp-row:hover { background: var(--bg-sub); }

    .exp-name {
      font-family: var(--ff-display);
      font-size: var(--fs-md);
      font-weight: 500;
      letter-spacing: -0.005em;
      color: var(--text);
      line-height: var(--lh-tight);
    }

    .exp-date {
      font-size: var(--fs-sm);
      color: var(--text-3);
      font-variant-numeric: tabular-nums;
      display: flex;
      align-items: center;
      gap: var(--s-4);
    }
    .exp-date-icon {
      opacity: 0;
      color: var(--text-4);
      cursor: pointer;
      transition: opacity var(--dur-fast) var(--ease-out);
      flex-shrink: 0;
    }
    .exp-row:hover .exp-date-icon { opacity: 0.6; }
    .exp-date-icon:hover { opacity: 1 !important; color: var(--accent); }

    .exp-target {
      font-size: var(--fs-sm);
      color: var(--text-3);
      font-variant-numeric: tabular-nums;
    }

    .exp-actual {
      font-size: var(--fs-sm);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      cursor: pointer;
      transition: color var(--dur-fast) var(--ease-out);
    }
    .exp-actual:hover { color: var(--accent); }
    .exp-actual.hit { color: var(--hit); }
    .exp-actual.miss { color: var(--accent); }
    .exp-actual.pending { color: var(--text-4); font-weight: 400; }
    .exp-actual input {
      width: 4rem;
      border: 1.5px solid var(--accent);
      border-radius: var(--s-4);
      padding: var(--s-2) var(--s-6);
      font-size: var(--fs-sm);
      font-family: var(--ff-body);
      outline: none;
      background: var(--bg);
      color: var(--text);
      text-align: right;
    }

    /* Verdict pill */
    .verdict {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: var(--s-4) var(--s-8);
      border-radius: var(--s-4);
      font-size: var(--fs-xs);
      font-weight: 600;
      cursor: pointer;
      transition: opacity var(--dur-fast) var(--ease-out);
      white-space: nowrap;
      text-align: right;
      float: right;
    }
    .verdict:hover { opacity: 0.75; }
    .verdict.keep    { background: var(--hit-bg);    color: var(--hit); }
    .verdict.change  { background: var(--accent-bg); color: var(--accent); }
    .verdict.close   { background: var(--change-bg); color: var(--change); }
    .verdict.pending { background: var(--muted-bg);  color: var(--muted); }
    .verdict.stop    { background: var(--muted-bg);  color: var(--muted); }

    /* --- Expand Panel (grid-template-rows animation) --- */
    .exp-expand-wrap {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows var(--dur-slow) var(--ease-out);
    }
    .exp-expand-wrap.open {
      grid-template-rows: 1fr;
    }
    .exp-expand-inner {
      overflow: hidden;
    }

    .exp-detail {
      padding: var(--s-4) 0 var(--s-24);
    }
    .exp-detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(7rem, 1fr));
      gap: var(--s-12) var(--s-24);
      margin-bottom: var(--s-16);
    }
    .detail-field {}
    .detail-label {
      font-size: var(--fs-xs);
      font-weight: 600;
      color: var(--text-4);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: var(--s-2);
    }
    .detail-value {
      font-size: var(--fs-sm);
      color: var(--text-2);
      line-height: var(--lh-body);
    }
    .detail-value.editable {
      cursor: pointer;
      transition: color var(--dur-fast) var(--ease-out);
    }
    .detail-value.editable:hover { color: var(--accent); }
    .detail-value input {
      width: 100%;
      border: 1.5px solid var(--accent);
      border-radius: var(--s-4);
      padding: var(--s-4) var(--s-8);
      font-size: var(--fs-sm);
      font-family: var(--ff-body);
      outline: none;
      background: var(--bg);
      color: var(--text);
    }

    .detail-idea {
      grid-column: 1 / -1;
    }

    .detail-next {
      grid-column: 1 / -1;
      margin-top: var(--s-4);
    }
    .detail-next-text {
      font-size: var(--fs-sm);
      color: var(--text-2);
      cursor: pointer;
      padding: var(--s-8);
      border-radius: var(--s-4);
      background: var(--bg-sub);
      min-height: 2.25rem;
      line-height: var(--lh-body);
      transition: background var(--dur-fast) var(--ease-out);
    }
    .detail-next-text:hover { background: var(--surface); }
    .detail-next-text .ph { color: var(--text-4); }
    .detail-next-text input {
      width: 100%;
      border: 1.5px solid var(--accent);
      border-radius: var(--s-4);
      padding: var(--s-6) var(--s-8);
      font-size: var(--fs-sm);
      font-family: var(--ff-body);
      outline: none;
      background: var(--bg);
      color: var(--text);
    }

    /* Verdict buttons in expanded view */
    .verdict-group {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: var(--s-6);
      flex-wrap: wrap;
      margin-top: var(--s-8);
    }
    .verdict-group-label {
      font-size: var(--fs-xs);
      font-weight: 600;
      color: var(--text-4);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-right: var(--s-4);
    }
    .vbtn {
      padding: var(--s-4) var(--s-12);
      border-radius: var(--s-4);
      font-size: var(--fs-xs);
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: opacity var(--dur-fast) var(--ease-out),
                  border-color var(--dur-fast) var(--ease-out);
      font-family: var(--ff-body);
    }
    .vbtn:hover { opacity: 0.75; }
    .vbtn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .vbtn.active { border-color: var(--text-2); }
    .vbtn.v-keep    { background: var(--hit-bg);    color: var(--hit); }
    .vbtn.v-change  { background: var(--accent-bg); color: var(--accent); }
    .vbtn.v-close   { background: var(--change-bg); color: var(--change); }
    .vbtn.v-stop    { background: var(--muted-bg);  color: var(--muted); }

    /* --- Stopped Toggle --- */
    .stopped-toggle {
      font-size: var(--fs-sm);
      color: var(--text-4);
      cursor: pointer;
      margin-top: var(--s-12);
      padding: var(--s-4) 0;
      transition: color var(--dur-fast) var(--ease-out);
    }
    .stopped-toggle:hover { color: var(--text-2); }

    .stopped-list {
      display: none;
      opacity: 0.45;
      margin-top: var(--s-8);
    }
    .stopped-list .exp-row { cursor: default; }
    .stopped-list .exp-row:hover { background: transparent; }

    /* --- Save Notice --- */
    .save-notice {
      position: fixed;
      bottom: var(--s-24);
      left: 50%;
      transform: translateX(-50%) translateY(var(--s-8));
      background: var(--text);
      color: var(--bg);
      padding: var(--s-8) var(--s-24);
      border-radius: var(--s-24);
      font-size: var(--fs-sm);
      font-weight: 600;
      opacity: 0;
      transition: opacity var(--dur-mid) var(--ease-out),
                  transform var(--dur-mid) var(--ease-out);
      pointer-events: none;
      z-index: 200;
    }
    .save-notice.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* --- Modal / Chat --- */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: oklch(25% 0.015 55 / 0.45);
      backdrop-filter: blur(4px);
      z-index: 100;
      justify-content: center;
      align-items: flex-end;
    }
    .modal-overlay.open { display: flex; }

    .chat {
      background: var(--bg);
      border-radius: var(--s-8) var(--s-8) 0 0;
      width: 28rem;
      max-width: 100vw;
      box-shadow: 0 -2px 24px oklch(25% 0.01 55 / 0.12);
      display: flex;
      flex-direction: column;
      max-height: 75vh;
      border: 1px solid var(--rule);
      border-bottom: none;
    }
    .chat-header {
      padding: var(--s-16) var(--s-20);
      border-bottom: 1px solid var(--rule);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .chat-header h2 {
      font-family: var(--ff-display);
      font-size: var(--fs-md);
      font-weight: 500;
    }
    .chat-close {
      background: none;
      border: none;
      font-size: var(--fs-lg);
      color: var(--text-4);
      cursor: pointer;
      padding: var(--s-4);
      line-height: 1;
      transition: color var(--dur-fast) var(--ease-out);
    }
    .chat-close:hover { color: var(--text); }
    .chat-close:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: var(--s-16) var(--s-20);
      display: flex;
      flex-direction: column;
      gap: var(--s-8);
    }

    .msg {
      max-width: 85%;
      padding: var(--s-8) var(--s-12);
      border-radius: var(--s-6);
      font-size: var(--fs-sm);
      line-height: var(--lh-body);
      animation: msg-in var(--dur-mid) var(--ease-out);
    }
    @keyframes msg-in {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg.bot {
      align-self: flex-start;
      background: var(--surface);
      color: var(--text-2);
      border-bottom-left-radius: var(--s-2);
    }
    .msg.user {
      align-self: flex-end;
      background: var(--accent);
      color: oklch(97% 0.008 55);
      border-bottom-right-radius: var(--s-2);
    }
    .msg.summary {
      align-self: flex-start;
      background: var(--hit-bg);
      border: 1px solid oklch(48% 0.10 155 / 0.15);
      border-radius: var(--s-6);
      max-width: 100%;
      font-size: var(--fs-sm);
    }
    .msg.summary .sl {
      font-size: var(--fs-xs);
      font-weight: 600;
      color: var(--text-4);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .msg.summary .sv {
      font-weight: 600;
      margin-bottom: var(--s-4);
    }

    .chat-input {
      padding: var(--s-12) var(--s-16);
      border-top: 1px solid var(--rule);
      display: flex;
      gap: var(--s-6);
    }
    .chat-input input {
      flex: 1;
      border: 1.5px solid var(--rule);
      border-radius: var(--s-4);
      padding: var(--s-8) var(--s-12);
      font-size: var(--fs-sm);
      font-family: var(--ff-body);
      outline: none;
      background: var(--bg);
      color: var(--text);
      transition: border-color var(--dur-fast) var(--ease-out);
    }
    .chat-input input:focus { border-color: var(--accent); }
    .chat-input button {
      padding: var(--s-8) var(--s-16);
      border-radius: var(--s-4);
      font-size: var(--fs-sm);
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: var(--accent);
      color: oklch(97% 0.008 55);
      font-family: var(--ff-body);
      transition: background var(--dur-fast) var(--ease-out);
    }
    .chat-input button:hover { background: var(--accent-hover); }
    .chat-input button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .chat-input .skip {
      padding: var(--s-8) var(--s-12);
      border-radius: var(--s-4);
      font-size: var(--fs-xs);
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: var(--surface);
      color: var(--text-3);
      font-family: var(--ff-body);
      transition: background var(--dur-fast) var(--ease-out);
    }
    .chat-input .skip:hover { background: var(--rule); }

    /* --- Responsive --- */
    @media (max-width: 640px) {
      .exp-cols,
      .exp-row {
        grid-template-columns: 1fr 4.5rem 5rem;
      }
      .exp-cols > :nth-child(2),
      .exp-row  > :nth-child(2),
      .exp-cols > :nth-child(3),
      .exp-row  > :nth-child(3) {
        display: none;
      }
      .flow-tab { min-width: 4.25rem; padding: var(--s-8) var(--s-12); }
      .exp-detail-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<div class="page">
  <div class="header">
    <div>
      <h1 class="header-title">Nevara GTM</h1>
      <div class="header-sub">Hypothesis Sprint Board</div>
    </div>
    <button class="add-btn" onclick="openModal()">+ New Experiment</button>
  </div>

  <div class="sprint-label" id="sprint-label">Sprint 1</div>
  <div class="sprint-dates">Mar 24 -- 28, 2026</div>

  <div class="ns">
    <div class="ns-label">Activated Users</div>
    <div class="ns-row">
      <div class="ns-value" id="ns-val">0</div>
      <div class="ns-of">/ 20 target</div>
    </div>
    <div class="ns-track"><div class="ns-fill" id="ns-bar"></div></div>
    <div class="ns-sub">Downloaded + signed up + first call completed</div>
  </div>

  <div class="flow-nav" id="flow"></div>

  <div id="board"></div>
  <div class="save-notice" id="saved">Saved</div>

  <div class="modal-overlay" id="modal">
    <div class="chat">
      <div class="chat-header"><h2>New Experiment</h2><button class="chat-close" onclick="closeModal()">&times;</button></div>
      <div class="chat-messages" id="chat-msgs"></div>
      <div class="chat-input" id="chat-input">
        <input type="text" id="chat-in" placeholder="Type here..." onkeydown="if(event.key==='Enter')sendMsg()">
        <button class="skip" onclick="skipStep()">Skip</button>
        <button onclick="sendMsg()">Send</button>
      </div>
    </div>
  </div>
</div>

<script>
const K='gtm_v18';
const VERDICTS=['pending','Keep going','Change variables','Close, iterate','Stop'];

const CH={
  linkedin:{label:'LinkedIn',color:'oklch(48% 0.12 250)',metric:'Reply Rate',calc:(e)=>e.m[0]>0?((e.m[1]/e.m[0])*100).toFixed(1)+'%':'—',calcNum:(e)=>e.m[0]>0?e.m[1]/e.m[0]:0,cols:['Sent','Replies','Signups']},
  twitter:{label:'Twitter',color:'oklch(52% 0.10 45)',metric:'Engagement',calc:(e)=>e.m[0]>0?((e.m[1]/e.m[0])*100).toFixed(1)+'%':'—',calcNum:(e)=>e.m[0]>0?e.m[1]/e.m[0]:0,cols:['Replies','Engagements','Visits']},
  reddit:{label:'Reddit',color:'oklch(52% 0.16 28)',metric:'Reply-back',calc:(e)=>e.m[0]>0?((e.m[1]/e.m[0])*100).toFixed(1)+'%':'—',calcNum:(e)=>e.m[0]>0?e.m[1]/e.m[0]:0,cols:['Replies','Reply-backs','Visits']},
  events:{label:'Events',color:'oklch(55% 0.12 65)',metric:'Conv Rate',calc:(e)=>e.m[0]>0?((e.m[2]/e.m[0])*100).toFixed(1)+'%':'—',calcNum:(e)=>e.m[0]>0?e.m[2]/e.m[0]:0,cols:['Convos','Contacts','Signups']},
  email:{label:'Email',color:'oklch(48% 0.10 155)',metric:'Open Rate',calc:(e)=>e.m[0]>0?((e.m[1]/e.m[0])*100).toFixed(1)+'%':'—',calcNum:(e)=>e.m[0]>0?e.m[1]/e.m[0]:0,cols:['Sent','Opened','Signups']},
  product:{label:'Product',color:'oklch(50% 0.015 55)',metric:'Activation',calc:(e)=>e.m[0]>0?((e.m[2]/e.m[0])*100).toFixed(1)+'%':'—',calcNum:(e)=>e.m[0]>0?e.m[2]/e.m[0]:0,cols:['Targeted','Engaged','Activated']},
  content:{label:'Content',color:'oklch(48% 0.08 30)',metric:'Signup Rate',calc:(e)=>e.m[1]>0?((e.m[2]/e.m[1])*100).toFixed(2)+'%':'—',calcNum:(e)=>e.m[1]>0?e.m[2]/e.m[1]:0,cols:['Published','Impressions','Signups']},
};

const D=[
  {id:1,ch:'linkedin',name:"Autopilot Outbound",started:"Mar 24",target:">10% reply",targetNum:0.10,idea:"Reads ICP filters, sends connection requests on autopilot via Sales Nav → Dripify.",m:[200,17,3],hours:4,verdict:"",next:""},
  {id:2,ch:'linkedin',name:"Post Engagers",started:"Mar 24",target:">3x vs cold",targetNum:0.20,idea:"Scrape engagements from posts like rmeadows. Build lead lists.",m:[34,8,5],hours:2,verdict:"Keep going",next:"Run on 5 more posts. Commenters only."},
  {id:3,ch:'linkedin',name:"Referral Posts",started:"Mar 24",target:">30% DM reply",targetNum:0.30,idea:"Find 'calling on my network' posts. DM people asking for recs.",m:[20,7,2],hours:1.5,verdict:"Keep going",next:""},
  {id:4,ch:'linkedin',name:"Influencer Monitor",started:"Mar 24",target:">20% DM reply",targetNum:0.20,idea:"Follow Mark Roberge etc, see which AEs engage, DM them.",m:[30,4,1],hours:2,verdict:"Change variables",next:"Try commenting on their posts first before DMing."},
  {id:5,ch:'linkedin',name:"Warm Intros",started:"Mar 25",target:">40% meeting",targetNum:0.40,idea:"Mine LinkedIn network → warm intros to target accounts.",m:[10,5,3],hours:1,verdict:"Keep going",next:"Draft blurbs for Maruthi."},
  {id:6,ch:'email',name:"Gift Outreach",started:"Mar 25",target:">35% response",targetNum:0.35,idea:"Find interesting thing about AE, send personalized gift.",m:[15,4,1],hours:3,verdict:"",next:""},
  {id:7,ch:'events',name:"Coffee Events",started:"Mar 26",target:">50% conv",targetNum:0.50,idea:"Coffee at sales meetups, start conversations with AEs.",m:[40,18,3],hours:5,verdict:"Close, iterate",next:"Book 2 more. Try branded cups + QR."},
  {id:8,ch:'twitter',name:"Twitter Outreach",started:"Mar 24",target:">15% engage",targetNum:0.15,idea:"Reply to right people on Twitter. Surface AEs talking about pain.",m:[100,6,0],hours:2,verdict:"",next:""},
  {id:9,ch:'reddit',name:"Reddit Listening",started:"Mar 24",target:">20% reply-back",targetNum:0.20,idea:"Surface Reddit posts about sales pain. Reply with value.",m:[20,4,0],hours:1.5,verdict:"Keep going",next:"Continue building presence on r/sales."},
  {id:10,ch:'product',name:"User Segmentation",started:"—",target:">5% reactivation",targetNum:0.05,idea:"Churned / returned / retained users. Segment and re-engage.",m:[0,0,0],hours:0,verdict:"",next:"Need product data access."},
  {id:11,ch:'product',name:"In-App Nudges",started:"—",target:">15% adoption",targetNum:0.15,idea:"Slack broadcasts + in-platform messaging for underused features.",m:[0,0,0],hours:0,verdict:"",next:"Need analytics access."},
  {id:12,ch:'product',name:"Docs Rewrite",started:"—",target:">30% fewer tickets",targetNum:0.30,idea:"Product documentation and enablement.",m:[0,0,0],hours:0,verdict:"",next:"Need support data."},
  {id:13,ch:'content',name:"SEO Sprint",started:"—",target:">2% CTR",targetNum:0.02,idea:"AI SEO — rank for AE pain keywords.",m:[0,0,0],hours:0,verdict:"Stop",next:"Parked. Focus outbound first."},
  {id:14,ch:'content',name:"Content Blitz",started:"—",target:">50 imp/post",targetNum:0.01,idea:"Organic content across LinkedIn, Twitter, Reddit, HN, Quora.",m:[0,0,0],hours:0,verdict:"Stop",next:"Parked. Needs 30+ posts."},
];

let activeFlow='linkedin';
function load(){const s=localStorage.getItem(K);if(s)return JSON.parse(s);save(D);return D;}
function save(d){localStorage.setItem(K,JSON.stringify(d));}
function flash(){document.getElementById('saved').classList.add('show');setTimeout(()=>document.getElementById('saved').classList.remove('show'),1200);}
function setFlow(ch){activeFlow=ch;render();}

function render(){
  const exps=load();

  // North star
  const totalSignups=exps.reduce((s,e)=>s+(e.m?e.m[2]:0),0);
  const activated=Math.round(totalSignups*0.61);
  const pct=Math.min(100,Math.round((activated/20)*100));
  document.getElementById('ns-val').textContent=activated;
  const bar=document.getElementById('ns-bar');
  bar.style.width=pct+'%';
  bar.style.background=pct>=100?'var(--hit)':pct>=60?'var(--change)':'var(--accent)';

  // Group
  const groups={};
  exps.forEach(e=>{const c=e.ch||'linkedin';if(!groups[c])groups[c]=[];groups[c].push(e);});

  // Flow
  const flowOrder=['linkedin','twitter','reddit','events','email','product','content'];
  document.getElementById('flow').innerHTML=flowOrder.filter(k=>groups[k]).map(k=>{
    const info=CH[k];
    const g=groups[k]||[];
    const signups=g.reduce((s,e)=>s+(e.m?e.m[2]:0),0);
    return`<div class="flow-tab ${activeFlow===k?'active':''}" onclick="setFlow('${k}')">
      <div class="flow-tab-label">${info.label}</div>
      <div class="flow-tab-num ${signups>0?'has-data':''}">${signups}</div>
      <div class="flow-tab-count">${g.length} exp${g.length!==1?'s':''}</div>
    </div>`;
  }).join('');

  // Board — active platform only
  const info=CH[activeFlow];
  const g=(groups[activeFlow]||[]);
  const active=g.filter(e=>e.verdict!=='Stop');
  const stopped=g.filter(e=>e.verdict==='Stop');

  let html=`<div class="platform">
    <div class="platform-head">
      <div class="platform-dot" style="background:${info.color}"></div>
      <div class="platform-name">${info.label}</div>
      <div class="platform-meta">${g.length} experiments &middot; ${info.metric}</div>
    </div>
    <div class="exp-list">
      <div class="exp-cols">
        <div class="exp-col-label">Experiment</div>
        <div class="exp-col-label">Started</div>
        <div class="exp-col-label">Target</div>
        <div class="exp-col-label">Actual</div>
        <div class="exp-col-label" style="text-align:right">Verdict</div>
      </div>`;

  active.forEach(e=>{
    const actual=info.calc(e);
    const actualNum=info.calcNum(e);
    const hasData=e.m&&e.m[0]>0;
    const hit=hasData&&actualNum>=e.targetNum;
    const close=hasData&&actualNum>=e.targetNum*0.8&&actualNum<e.targetNum;
    const miss=hasData&&actualNum<e.targetNum*0.8;
    const actualCls=!hasData?'pending':hit?'hit':close?'':'miss';
    const verdictCls=!e.verdict||e.verdict==='pending'?'pending':e.verdict==='Keep going'?'keep':e.verdict==='Change variables'?'change':e.verdict==='Close, iterate'?'close':'stop';

    html+=`<div class="exp-item">
      <div class="exp-row" onclick="toggleExp(${e.id})">
        <div class="exp-name">${e.name}</div>
        <div class="exp-date">
          <span>${e.started||'—'}</span>
          <span class="exp-date-icon" onclick="event.stopPropagation();editDate(${e.id},this.parentElement)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
        </div>
        <div class="exp-target">${e.target}</div>
        <div class="exp-actual ${actualCls}" onclick="event.stopPropagation();editActual(${e.id},this)">${hasData?actual:'—'}</div>
        <div><span class="verdict ${verdictCls}" onclick="event.stopPropagation();cycleVerdict(${e.id})">${e.verdict||'—'}</span></div>
      </div>
      <div class="exp-expand-wrap" id="expand-${e.id}">
        <div class="exp-expand-inner">
          <div class="exp-detail">
            <div class="exp-detail-grid">
              <div class="detail-field detail-idea"><div class="detail-label">Idea</div><div class="detail-value">${e.idea}</div></div>
              <div class="detail-field"><div class="detail-label">${info.cols[0]}</div><div class="detail-value editable" onclick="editM(${e.id},0,this)">${e.m?e.m[0]:0}</div></div>
              <div class="detail-field"><div class="detail-label">${info.cols[1]}</div><div class="detail-value editable" onclick="editM(${e.id},1,this)">${e.m?e.m[1]:0}</div></div>
              <div class="detail-field"><div class="detail-label">${info.cols[2]}</div><div class="detail-value editable" onclick="editM(${e.id},2,this)">${e.m?e.m[2]:0}</div></div>
              <div class="detail-field"><div class="detail-label">Hours</div><div class="detail-value editable" onclick="editHours(${e.id},this)">${e.hours||0}h</div></div>
              <div class="detail-next"><div class="detail-label">Next Step</div><div class="detail-next-text" onclick="event.stopPropagation();editNext(${e.id},this)">${e.next||'<span class="ph">What to do next sprint...</span>'}</div></div>
              <div class="verdict-group">
                <span class="verdict-group-label">Verdict</span>
                ${['Keep going','Change variables','Close, iterate','Stop'].map(v=>`<div class="vbtn v-${v==='Keep going'?'keep':v==='Change variables'?'change':v==='Close, iterate'?'close':'stop'} ${e.verdict===v?'active':''}" onclick="event.stopPropagation();setVerdict(${e.id},'${v}')">${v}</div>`).join('')}
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>`;
  });

  html+=`</div>`;

  if(stopped.length){
    html+=`<div class="stopped-toggle" onclick="document.getElementById('stopped-${activeFlow}').style.display=document.getElementById('stopped-${activeFlow}').style.display==='none'?'block':'none'">Stopped &middot; ${stopped.length} &#9662;</div>
    <div id="stopped-${activeFlow}" class="stopped-list">
    <div class="exp-list">
    ${stopped.map(e=>`<div class="exp-item"><div class="exp-row">
      <div class="exp-name">${e.name}</div>
      <div class="exp-date">${e.started||'—'}</div>
      <div class="exp-target">${e.target}</div>
      <div class="exp-actual pending">—</div>
      <div><span class="verdict stop" style="float:right">Stop</span></div>
    </div></div>`).join('')}
    </div></div>`;
  }

  html+=`</div>`;
  document.getElementById('board').innerHTML=html;
}

function toggleExp(id){document.getElementById('expand-'+id).classList.toggle('open');}

function cycleVerdict(id){
  const exps=load();const e=exps.find(x=>x.id===id);
  const opts=['','Keep going','Change variables','Close, iterate','Stop'];
  const idx=opts.indexOf(e.verdict);
  e.verdict=opts[(idx+1)%opts.length];
  save(exps);flash();render();
}

function setVerdict(id,v){const exps=load();exps.find(x=>x.id===id).verdict=v;save(exps);flash();render();}

function editActual(id,el){
  const exps=load();const e=exps.find(x=>x.id===id);const info=CH[e.ch];
  const val=prompt(`${e.name} — enter ${info.cols[1]} count:`,e.m?e.m[1]:0);
  if(val===null)return;
  if(!e.m)e.m=[0,0,0];
  e.m[1]=parseInt(val)||0;
  save(exps);flash();render();
}

function editM(id,idx,el){
  const exps=load();const e=exps.find(x=>x.id===id);const info=CH[e.ch];
  const val=prompt(`${e.name} — ${info.cols[idx]}:`,e.m?e.m[idx]:0);
  if(val===null)return;
  if(!e.m)e.m=[0,0,0];
  e.m[idx]=parseInt(val)||0;
  save(exps);flash();render();
}

function editHours(id,el){
  const exps=load();const e=exps.find(x=>x.id===id);
  const val=prompt(`${e.name} — hours:`,e.hours||0);
  if(val===null)return;
  e.hours=parseFloat(val)||0;
  save(exps);flash();render();
}

function editDate(id,el){
  const exps=load();const e=exps.find(x=>x.id===id);
  const input=document.createElement('input');
  input.type='date';
  input.style.cssText='font-size:var(--fs-sm);font-family:var(--ff-body);border:1.5px solid var(--accent);border-radius:var(--s-4);padding:var(--s-2) var(--s-4);outline:none;background:var(--bg);color:var(--text);';
  el.innerHTML='';el.appendChild(input);input.focus();
  function c(){
    if(input.value){
      const d=new Date(input.value+'T00:00:00');
      const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
      e.started=mo+' '+d.getDate();
    }
    save(exps);flash();render();
  }
  input.addEventListener('change',c);
  input.addEventListener('blur',c);
}

function editNext(id,el){
  const exps=load();const e=exps.find(x=>x.id===id);
  const input=document.createElement('input');input.type='text';input.value=e.next||'';input.placeholder='What to change next sprint...';
  el.innerHTML='';el.appendChild(input);input.focus();
  function c(){e.next=input.value;save(exps);flash();render();}
  input.addEventListener('blur',c);input.addEventListener('keydown',ev=>{if(ev.key==='Enter')c();});
}

// Chat
const SM={'linkedin':{ch:'linkedin',name:'LinkedIn Outbound',target:'>20% reply',targetNum:0.20},'sales nav':{ch:'linkedin',name:'Sales Nav Outbound',target:'>25% accept',targetNum:0.25},'reddit':{ch:'reddit',name:'Reddit Listening',target:'>20% reply-back',targetNum:0.20},'twitter':{ch:'twitter',name:'Twitter Outreach',target:'>15% engagement',targetNum:0.15},'event':{ch:'events',name:'Event Marketing',target:'>5 signups',targetNum:0.50},'coffee':{ch:'events',name:'Coffee Events',target:'>50% conv',targetNum:0.50},'email':{ch:'email',name:'Email Campaign',target:'>40% open',targetNum:0.40},'churn':{ch:'product',name:'Win-Back',target:'>5% reactivation',targetNum:0.05},'seo':{ch:'content',name:'SEO Sprint',target:'>2% CTR',targetNum:0.02},'content':{ch:'content',name:'Content Push',target:'>50 imp/post',targetNum:0.01},'slack':{ch:'product',name:'Slack Broadcast',target:'>15% engagement',targetNum:0.15},'in-app':{ch:'product',name:'In-App Nudges',target:'>15% adoption',targetNum:0.15},'gift':{ch:'email',name:'Gift Outreach',target:'>35% response',targetNum:0.35},'influencer':{ch:'linkedin',name:'Influencer Monitor',target:'>20% DM reply',targetNum:0.20},'warm':{ch:'linkedin',name:'Warm Intros',target:'>40% meeting',targetNum:0.40},'referral':{ch:'linkedin',name:'Referral Posts',target:'>30% DM reply',targetNum:0.30},'scrape':{ch:'linkedin',name:'Post Engagers',target:'>3x vs cold',targetNum:0.20},'docs':{ch:'product',name:'Docs Rewrite',target:'>30% fewer tickets',targetNum:0.30}};

function suggest(idea){const l=idea.toLowerCase();let b=null,bs=0;for(const[k,s]of Object.entries(SM)){if(l.includes(k)&&k.length>bs){b=s;bs=k.length;}}return b||{ch:'linkedin',name:idea.split(' ').slice(0,3).join(' '),target:'TBD',targetNum:0};}

let cp=0,cd={};
function openModal(){cp=0;cd={};document.getElementById('modal').classList.add('open');document.getElementById('chat-msgs').innerHTML='';resetCI();setTimeout(()=>{addBot("What's the idea?");document.getElementById('chat-in').focus();},200);}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function resetCI(){document.getElementById('chat-input').innerHTML=`<input type="text" id="chat-in" placeholder="Type here..." onkeydown="if(event.key==='Enter')sendMsg()"><button class="skip" onclick="skipStep()">Skip</button><button onclick="sendMsg()">Send</button>`;}
function addBot(t){const d=document.createElement('div');d.className='msg bot';d.innerHTML=t;document.getElementById('chat-msgs').appendChild(d);document.getElementById('chat-msgs').scrollTop=99999;}
function addUser(t){const d=document.createElement('div');d.className='msg user';d.textContent=t;document.getElementById('chat-msgs').appendChild(d);document.getElementById('chat-msgs').scrollTop=99999;}

function sendMsg(){
  const input=document.getElementById('chat-in');const v=input.value.trim();if(!v)return;
  addUser(v);input.value='';
  if(cp===0){cd.idea=v;cp=1;setTimeout(()=>{addBot("What's the goal?");input.focus();},300);}
  else if(cp===1){
    cd.goal=v==='idk'||v==='not sure'?'':v;cp=2;
    const s=suggest(cd.idea);Object.assign(cd,s);
    setTimeout(()=>{
      addBot("Here's what I'd suggest:");
      setTimeout(()=>{
        const d=document.createElement('div');d.className='msg summary';
        d.innerHTML=`<div style="font-weight:600;margin-bottom:6px">Suggested:</div><div class="sl">Name</div><div class="sv">${cd.name}</div><div class="sl">Platform</div><div class="sv">${(CH[cd.ch]||{}).label||cd.ch}</div><div class="sl">Target</div><div class="sv">${cd.target}</div>`;
        document.getElementById('chat-msgs').appendChild(d);document.getElementById('chat-msgs').scrollTop=99999;
        setTimeout(()=>{addBot("Look good?");document.getElementById('chat-input').innerHTML=`
          <button onclick="closeModal()" style="flex:1;padding:var(--s-8);border-radius:var(--s-4);font-size:var(--fs-sm);font-weight:600;cursor:pointer;border:1.5px solid var(--rule);background:transparent;color:var(--text-2);font-family:var(--ff-body)">Cancel</button>
          <button onclick="confirmAdd()" style="flex:2;padding:var(--s-8) var(--s-16);border-radius:var(--s-4);font-size:var(--fs-sm);font-weight:600;cursor:pointer;border:none;background:var(--hit);color:oklch(97% 0.008 55);font-family:var(--ff-body)">Add to Sprint</button>`;},400);
      },300);
    },300);
  }
}
function skipStep(){if(cp===0){cd.idea='';cp=1;addBot("What's the goal?");}else{cd.goal='';cp=2;const s=suggest(cd.idea||'');Object.assign(cd,s);sendMsg();}}

function confirmAdd(){
  const exps=load(),id=exps.reduce((m,e)=>Math.max(m,e.id),0)+1;
  const now=new Date();const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][now.getMonth()];
  exps.push({id,ch:cd.ch||'linkedin',name:cd.name,started:mo+' '+now.getDate(),target:cd.target||'TBD',targetNum:cd.targetNum||0,idea:cd.idea||'',m:[0,0,0],hours:0,verdict:'',next:''});
  save(exps);flash();closeModal();activeFlow=cd.ch||'linkedin';render();
}

document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
render();
</script>
