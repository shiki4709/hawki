<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nevara GTM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500&family=Plus+Jakarta+Sans:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #faf8f5;
      --text: #2c2926;
      --text-2: #6b6560;
      --text-3: #a8a29e;
      --rule: #e7e2dd;
      --accent: #c45d3e;
      --green: #5a8a6a;
      --amber: #c48a3e;
      --stopped: #a8a29e;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); max-width: 820px; margin: 0 auto; padding: 40px 24px 80px; }

    .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; }
    .header h1 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 24px; font-weight: 700; }
    .header .sub { font-size: 13px; color: var(--text-3); margin-top: 2px; }
    .add-btn { padding: 7px 16px; border-radius: 4px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--rule); background: transparent; color: var(--text-2); transition: all 0.15s; }
    .add-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Sprint header */
    .sprint-label { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 4px; letter-spacing: -0.2px; }
    .sprint-dates { font-size: 12px; color: var(--text-3); margin-bottom: 32px; }

    /* North Star */
    .ns { margin-bottom: 40px; }
    .ns-label { font-size: 11px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 500; }
    .ns-row { display: flex; align-items: baseline; gap: 12px; margin-top: 4px; }
    .ns-value { font-family: 'Plus Jakarta Sans', sans-serif; font-size: clamp(48px, 8vw, 64px); font-weight: 700; line-height: 1; letter-spacing: -2px; }
    .ns-of { font-size: 16px; color: var(--text-3); }
    .ns-bar { height: 3px; background: var(--rule); border-radius: 2px; margin-top: 12px; max-width: 320px; }
    .ns-bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s; }
    .ns-sub { font-size: 12px; color: var(--text-3); margin-top: 6px; }

    /* Flow */
    .flow { display: flex; gap: 2px; margin-bottom: 40px; border-bottom: 1px solid var(--rule); }
    .flow-step { padding: 10px 14px 12px; cursor: pointer; text-align: center; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: border-color 0.15s; min-width: 70px; }
    .flow-step:hover { background: rgba(0,0,0,0.015); }
    .flow-step.active { border-bottom-color: var(--accent); }
    .flow-name { font-size: 12px; font-weight: 500; color: var(--text-2); }
    .flow-step.active .flow-name { color: var(--text); font-weight: 500; }
    .flow-num { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 20px; font-weight: 700; color: var(--text-3); margin-top: 2px; }
    .flow-step.active .flow-num { color: var(--text); }
    .flow-num.has-data { color: var(--green); }
    .flow-count { font-size: 10px; color: var(--text-3); margin-top: 1px; }

    /* Platform section */
    .platform { margin-bottom: 48px; }
    .platform-header { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; padding-bottom: 8px; border-bottom: 1px solid var(--rule); }
    .platform-dot { width: 8px; height: 8px; border-radius: 2px; }
    .platform-title { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 15px; font-weight: 700; }
    .platform-meta { font-size: 12px; color: var(--text-3); margin-left: auto; }

    /* Sprint table */
    .sprint-table { width: 100%; border-collapse: collapse; margin-bottom: 8px; }
    .sprint-table th { text-align: left; padding: 8px 0; font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500; border-bottom: 1px solid var(--rule); }
    .sprint-table td { padding: 12px 0; border-bottom: 1px solid rgba(0,0,0,0.04); font-size: 13px; vertical-align: middle; }
    .sprint-table tr:last-child td { border-bottom: 1px solid var(--rule); }
    .sprint-table tr:hover td { background: rgba(0,0,0,0.01); }
    .sprint-table tr.hit td { }
    .sprint-table tr.miss td { }

    .exp-name-col { font-weight: 500; padding-right: 12px; }
    .metric-col { font-size: 12px; color: var(--text-2); }
    .target-col { font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text-3); font-variant-numeric: tabular-nums; }
    .date-col { font-size: 12px; color: var(--text-3); white-space: nowrap; }
    .date-text { margin-right: 4px; }
    .date-icon { cursor: pointer; color: var(--text-3); opacity: 0; transition: opacity 0.15s; vertical-align: middle; }
    tr:hover .date-icon { opacity: 0.6; }
    .date-icon:hover { opacity: 1 !important; color: var(--accent); }

    .actual-col { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; font-variant-numeric: tabular-nums; cursor: pointer; position: relative; }
    .actual-col:hover { color: var(--accent); }
    .actual-col::after { content: ''; }
    tr:hover .actual-col:not(.pending)::after { content: ' ✎'; font-size: 10px; color: var(--text-3); }
    .actual-col input { width: 60px; border: 1.5px solid var(--accent); border-radius: 3px; padding: 2px 6px; font-size: 13px; font-family: 'DM Sans', sans-serif; outline: none; text-align: right; background: var(--bg); color: var(--text); }
    .actual-col.hit { color: var(--green); }
    .actual-col.miss { color: var(--accent); }
    .actual-col.pending { color: var(--text-3); }

    .verdict-col { text-align: right; }
    .verdict {
      display: inline-block; padding: 3px 10px; border-radius: 3px;
      font-size: 11px; font-weight: 500; cursor: pointer;
    }
    .verdict.keep { background: rgba(90,138,106,0.1); color: var(--green); }
    .verdict.change { background: rgba(196,93,62,0.08); color: var(--accent); }
    .verdict.close { background: rgba(196,138,62,0.1); color: var(--amber); }
    .verdict.pending { background: rgba(0,0,0,0.03); color: var(--text-3); }
    .verdict.stop { background: rgba(0,0,0,0.03); color: var(--stopped); }

    /* Expand row */
    .exp-expand { display: none; }
    .exp-expand.open { display: table-row; }
    .exp-expand td { padding: 16px 0 20px; border-bottom: 1px solid var(--rule); }
    .expand-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .expand-field {}
    .expand-label { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
    .expand-value { font-size: 13px; color: var(--text-2); }
    .expand-next { grid-column: 1 / -1; margin-top: 4px; }
    .expand-next-text { font-size: 13px; color: var(--text-2); cursor: pointer; padding: 6px 8px; border-radius: 3px; background: rgba(0,0,0,0.02); min-height: 32px; }
    .expand-next-text:hover { background: rgba(0,0,0,0.04); }
    .expand-next-text .ph { color: var(--text-3); }
    .expand-next-text input { width: 100%; border: 1.5px solid var(--accent); border-radius: 3px; padding: 5px 8px; font-size: 13px; font-family: 'DM Sans', sans-serif; outline: none; background: var(--bg); color: var(--text); }
    .expand-actions { grid-column: 1 / -1; display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
    .expand-actions-label { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.5px; margin-right: 4px; align-self: center; }
    .vbtn { padding: 3px 10px; border-radius: 3px; font-size: 11px; font-weight: 500; cursor: pointer; border: 1px solid transparent; transition: all 0.1s; font-family: 'DM Sans', sans-serif; }
    .vbtn.active { border-color: var(--text); }
    .vbtn:hover { opacity: 0.8; }
    .vbtn.v-keep { background: rgba(90,138,106,0.1); color: var(--green); }
    .vbtn.v-change { background: rgba(196,93,62,0.08); color: var(--accent); }
    .vbtn.v-close { background: rgba(196,138,62,0.1); color: var(--amber); }
    .vbtn.v-stop { background: rgba(0,0,0,0.03); color: var(--stopped); }

    .stopped-toggle { font-size: 12px; color: var(--text-3); cursor: pointer; margin-top: 8px; }
    .stopped-toggle:hover { color: var(--text-2); }

    /* Save toast */
    .save-notice { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(10px); background: var(--text); color: var(--bg); padding: 8px 20px; border-radius: 20px; font-size: 12px; font-weight: 500; opacity: 0; transition: opacity 0.3s, transform 0.3s; pointer-events: none; }
    .save-notice.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Chat */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(44,41,38,0.4); backdrop-filter: blur(3px); z-index: 100; justify-content: center; align-items: flex-end; }
    .modal-overlay.open { display: flex; }
    .chat { background: var(--bg); border-radius: 8px 8px 0 0; width: 440px; max-width: 100vw; box-shadow: 0 -4px 30px rgba(0,0,0,0.1); display: flex; flex-direction: column; max-height: 75vh; border: 1px solid var(--rule); border-bottom: none; }
    .chat-header { padding: 14px 18px; border-bottom: 1px solid var(--rule); display: flex; justify-content: space-between; align-items: center; }
    .chat-header h2 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 14px; font-weight: 700; }
    .chat-close { background: none; border: none; font-size: 16px; color: var(--text-3); cursor: pointer; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 14px 18px; display: flex; flex-direction: column; gap: 8px; }
    .msg { max-width: 85%; padding: 8px 12px; border-radius: 6px; font-size: 13px; line-height: 1.5; animation: mi 0.2s ease-out; }
    @keyframes mi { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }
    .msg.bot { align-self: flex-start; background: rgba(0,0,0,0.04); color: var(--text-2); border-bottom-left-radius: 2px; }
    .msg.user { align-self: flex-end; background: var(--accent); color: #faf8f5; border-bottom-right-radius: 2px; }
    .msg.summary { align-self: flex-start; background: rgba(90,138,106,0.06); border: 1px solid rgba(90,138,106,0.12); border-radius: 6px; max-width: 100%; font-size: 12px; }
    .msg.summary .sl { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.5px; }
    .msg.summary .sv { font-weight: 500; margin-bottom: 3px; }
    .chat-input { padding: 10px 14px; border-top: 1px solid var(--rule); display: flex; gap: 6px; }
    .chat-input input { flex: 1; border: 1px solid var(--rule); border-radius: 4px; padding: 8px 12px; font-size: 13px; font-family: 'DM Sans', sans-serif; outline: none; background: var(--bg); color: var(--text); }
    .chat-input input:focus { border-color: var(--accent); }
    .chat-input button { padding: 8px 14px; border-radius: 4px; font-size: 12px; font-weight: 500; cursor: pointer; border: none; background: var(--accent); color: #faf8f5; }
    .chat-input .skip { padding: 8px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; border: none; background: rgba(0,0,0,0.04); color: var(--text-3); }

    @media (max-width: 640px) {
      body { padding: 24px 16px 64px; }
      .flow { overflow-x: auto; flex-wrap: nowrap; }
      .flow-step { min-width: 60px; padding: 8px 10px 10px; }
      .expand-inner { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>Nevara GTM</h1>
    <div class="sub">Hypothesis Sprint Board</div>
  </div>
  <button class="add-btn" onclick="openModal()">+ New Experiment</button>
</div>

<div class="sprint-label" id="sprint-label">Sprint 1</div>
<div class="sprint-dates">Mar 24 – 28, 2026</div>

<div class="ns">
  <div class="ns-label">Activated Users</div>
  <div class="ns-row">
    <div class="ns-value" id="ns-val">0</div>
    <div class="ns-of">/ 20 target</div>
  </div>
  <div class="ns-bar"><div class="ns-bar-fill" id="ns-bar"></div></div>
  <div class="ns-sub">Downloaded + signed up + first call completed</div>
</div>

<div class="flow" id="flow"></div>

<div id="board"></div>
<div class="save-notice" id="saved">Saved</div>

<div class="modal-overlay" id="modal">
  <div class="chat">
    <div class="chat-header"><h2>New Experiment</h2><button class="chat-close" onclick="closeModal()">&times;</button></div>
    <div class="chat-messages" id="chat-msgs"></div>
    <div class="chat-input" id="chat-input">
      <input type="text" id="chat-in" placeholder="Type here..." onkeydown="if(event.key==='Enter')sendMsg()">
      <button class="skip" onclick="skipStep()">Skip</button>
      <button onclick="sendMsg()">Send</button>
    </div>
  </div>
</div>

<script>
const K='gtm_v18';
const VERDICTS=['pending','Keep going','Change variables','Close, iterate','Stop'];

const CH={
  linkedin:{label:'LinkedIn',color:'#2563a8',metric:'Reply Rate',calc:(e)=>e.m[0]>0?((e.m[1]/e.m[0])*100).toFixed(1)+'%':'—',calcNum:(e)=>e.m[0]>0?e.m[1]/e.m[0]:0,cols:['Sent','Replies','Signups']},
  twitter:{label:'Twitter',color:'#b06a52',metric:'Engagement',calc:(e)=>e.m[0]>0?((e.m[1]/e.m[0])*100).toFixed(1)+'%':'—',calcNum:(e)=>e.m[0]>0?e.m[1]/e.m[0]:0,cols:['Replies','Engagements','Visits']},
  reddit:{label:'Reddit',color:'#c45d3e',metric:'Reply-back',calc:(e)=>e.m[0]>0?((e.m[1]/e.m[0])*100).toFixed(1)+'%':'—',calcNum:(e)=>e.m[0]>0?e.m[1]/e.m[0]:0,cols:['Replies','Reply-backs','Visits']},
  events:{label:'Events',color:'#c48a3e',metric:'Conv Rate',calc:(e)=>e.m[0]>0?((e.m[2]/e.m[0])*100).toFixed(1)+'%':'—',calcNum:(e)=>e.m[0]>0?e.m[2]/e.m[0]:0,cols:['Convos','Contacts','Signups']},
  email:{label:'Email',color:'#5a8a6a',metric:'Open Rate',calc:(e)=>e.m[0]>0?((e.m[1]/e.m[0])*100).toFixed(1)+'%':'—',calcNum:(e)=>e.m[0]>0?e.m[1]/e.m[0]:0,cols:['Sent','Opened','Signups']},
  product:{label:'Product',color:'#7a7568',metric:'Activation',calc:(e)=>e.m[0]>0?((e.m[2]/e.m[0])*100).toFixed(1)+'%':'—',calcNum:(e)=>e.m[0]>0?e.m[2]/e.m[0]:0,cols:['Targeted','Engaged','Activated']},
  content:{label:'Content',color:'#9a6858',metric:'Signup Rate',calc:(e)=>e.m[1]>0?((e.m[2]/e.m[1])*100).toFixed(2)+'%':'—',calcNum:(e)=>e.m[1]>0?e.m[2]/e.m[1]:0,cols:['Published','Impressions','Signups']},
};

const D=[
  {id:1,ch:'linkedin',name:"Autopilot Outbound",started:"Mar 24",target:">10% reply",targetNum:0.10,idea:"Reads ICP filters, sends connection requests on autopilot via Sales Nav → Dripify.",m:[200,17,3],hours:4,verdict:"",next:""},
  {id:2,ch:'linkedin',name:"Post Engagers",started:"Mar 24",target:">3x vs cold",targetNum:0.20,idea:"Scrape engagements from posts like rmeadows. Build lead lists.",m:[34,8,5],hours:2,verdict:"Keep going",next:"Run on 5 more posts. Commenters only."},
  {id:3,ch:'linkedin',name:"Referral Posts",started:"Mar 24",target:">30% DM reply",targetNum:0.30,idea:"Find 'calling on my network' posts. DM people asking for recs.",m:[20,7,2],hours:1.5,verdict:"Keep going",next:""},
  {id:4,ch:'linkedin',name:"Influencer Monitor",started:"Mar 24",target:">20% DM reply",targetNum:0.20,idea:"Follow Mark Roberge etc, see which AEs engage, DM them.",m:[30,4,1],hours:2,verdict:"Change variables",next:"Try commenting on their posts first before DMing."},
  {id:5,ch:'linkedin',name:"Warm Intros",started:"Mar 25",target:">40% meeting",targetNum:0.40,idea:"Mine LinkedIn network → warm intros to target accounts.",m:[10,5,3],hours:1,verdict:"Keep going",next:"Draft blurbs for Maruthi."},
  {id:6,ch:'email',name:"Gift Outreach",started:"Mar 25",target:">35% response",targetNum:0.35,idea:"Find interesting thing about AE, send personalized gift.",m:[15,4,1],hours:3,verdict:"",next:""},
  {id:7,ch:'events',name:"Coffee Events",started:"Mar 26",target:">50% conv",targetNum:0.50,idea:"Coffee at sales meetups, start conversations with AEs.",m:[40,18,3],hours:5,verdict:"Close, iterate",next:"Book 2 more. Try branded cups + QR."},
  {id:8,ch:'twitter',name:"Twitter Outreach",started:"Mar 24",target:">15% engage",targetNum:0.15,idea:"Reply to right people on Twitter. Surface AEs talking about pain.",m:[100,6,0],hours:2,verdict:"",next:""},
  {id:9,ch:'reddit',name:"Reddit Listening",started:"Mar 24",target:">20% reply-back",targetNum:0.20,idea:"Surface Reddit posts about sales pain. Reply with value.",m:[20,4,0],hours:1.5,verdict:"Keep going",next:"Continue building presence on r/sales."},
  {id:10,ch:'product',name:"User Segmentation",started:"—",target:">5% reactivation",targetNum:0.05,idea:"Churned / returned / retained users. Segment and re-engage.",m:[0,0,0],hours:0,verdict:"",next:"Need product data access."},
  {id:11,ch:'product',name:"In-App Nudges",started:"—",target:">15% adoption",targetNum:0.15,idea:"Slack broadcasts + in-platform messaging for underused features.",m:[0,0,0],hours:0,verdict:"",next:"Need analytics access."},
  {id:12,ch:'product',name:"Docs Rewrite",started:"—",target:">30% fewer tickets",targetNum:0.30,idea:"Product documentation and enablement.",m:[0,0,0],hours:0,verdict:"",next:"Need support data."},
  {id:13,ch:'content',name:"SEO Sprint",started:"—",target:">2% CTR",targetNum:0.02,idea:"AI SEO — rank for AE pain keywords.",m:[0,0,0],hours:0,verdict:"Stop",next:"Parked. Focus outbound first."},
  {id:14,ch:'content',name:"Content Blitz",started:"—",target:">50 imp/post",targetNum:0.01,idea:"Organic content across LinkedIn, Twitter, Reddit, HN, Quora.",m:[0,0,0],hours:0,verdict:"Stop",next:"Parked. Needs 30+ posts."},
];

let activeFlow='linkedin';
function load(){const s=localStorage.getItem(K);if(s)return JSON.parse(s);save(D);return D;}
function save(d){localStorage.setItem(K,JSON.stringify(d));}
function flash(){document.getElementById('saved').classList.add('show');setTimeout(()=>document.getElementById('saved').classList.remove('show'),1200);}
function setFlow(ch){activeFlow=ch;render();}

function render(){
  const exps=load();

  // North star
  const totalSignups=exps.reduce((s,e)=>s+(e.m?e.m[2]:0),0);
  const activated=Math.round(totalSignups*0.61);
  const pct=Math.min(100,Math.round((activated/20)*100));
  document.getElementById('ns-val').textContent=activated;
  const bar=document.getElementById('ns-bar');
  bar.style.width=pct+'%';
  bar.style.background=pct>=100?'var(--green)':pct>=60?'var(--amber)':'var(--accent)';

  // Group
  const groups={};
  exps.forEach(e=>{const c=e.ch||'linkedin';if(!groups[c])groups[c]=[];groups[c].push(e);});

  // Flow
  const flowOrder=['linkedin','twitter','reddit','events','email','product','content'];
  document.getElementById('flow').innerHTML=flowOrder.filter(k=>groups[k]).map(k=>{
    const info=CH[k];
    const g=groups[k]||[];
    const signups=g.reduce((s,e)=>s+(e.m?e.m[2]:0),0);
    return`<div class="flow-step ${activeFlow===k?'active':''}" onclick="setFlow('${k}')">
      <div class="flow-name">${info.label}</div>
      <div class="flow-num ${signups>0?'has-data':''}">${signups}</div>
      <div class="flow-count">${g.length} exp${g.length!==1?'s':''}</div>
    </div>`;
  }).join('');

  // Board — active platform only
  const info=CH[activeFlow];
  const g=(groups[activeFlow]||[]);
  const active=g.filter(e=>e.verdict!=='Stop');
  const stopped=g.filter(e=>e.verdict==='Stop');

  let html=`<div class="platform">
    <div class="platform-header">
      <div class="platform-dot" style="background:${info.color}"></div>
      <div class="platform-title">${info.label}</div>
      <div class="platform-meta">${g.length} experiments · ${info.metric}</div>
    </div>
    <table class="sprint-table">
      <tr>
        <th>Experiment</th>
        <th>Started</th>
        <th>Target</th>
        <th>Actual</th>
        <th style="text-align:right">Verdict</th>
      </tr>`;

  active.forEach(e=>{
    const actual=info.calc(e);
    const actualNum=info.calcNum(e);
    const hasData=e.m&&e.m[0]>0;
    const hit=hasData&&actualNum>=e.targetNum;
    const close=hasData&&actualNum>=e.targetNum*0.8&&actualNum<e.targetNum;
    const miss=hasData&&actualNum<e.targetNum*0.8;
    const actualCls=!hasData?'pending':hit?'hit':close?'':'miss';
    const verdictCls=!e.verdict||e.verdict==='pending'?'pending':e.verdict==='Keep going'?'keep':e.verdict==='Change variables'?'change':e.verdict==='Close, iterate'?'close':'stop';

    html+=`<tr class="${actualCls}" onclick="toggleExp(${e.id})" style="cursor:pointer">
      <td class="exp-name-col">${e.name}</td>
      <td class="date-col"><span class="date-text">${e.started||'—'}</span><span class="date-icon" onclick="event.stopPropagation();editDate(${e.id},this.parentElement)"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span></td>
      <td class="target-col">${e.target}</td>
      <td class="actual-col ${actualCls}" onclick="event.stopPropagation();editActual(${e.id},this)">${hasData?actual:'—'}</td>
      <td class="verdict-col"><span class="verdict ${verdictCls}" onclick="event.stopPropagation();cycleVerdict(${e.id})">${e.verdict||'—'}</span></td>
    </tr>
    <tr class="exp-expand" id="expand-${e.id}"><td colspan="5">
      <div class="expand-inner">
        <div class="expand-field"><div class="expand-label">Idea</div><div class="expand-value">${e.idea}</div></div>
        <div class="expand-field"><div class="expand-label">Hours</div><div class="expand-value">${e.hours||0}h</div></div>
        <div class="expand-field"><div class="expand-label">${info.cols[0]}</div><div class="expand-value actual-col" onclick="editM(${e.id},0,this)" style="cursor:pointer">${e.m?e.m[0]:0}</div></div>
        <div class="expand-field"><div class="expand-label">${info.cols[1]}</div><div class="expand-value actual-col" onclick="editM(${e.id},1,this)" style="cursor:pointer">${e.m?e.m[1]:0}</div></div>
        <div class="expand-field"><div class="expand-label">${info.cols[2]}</div><div class="expand-value actual-col" onclick="editM(${e.id},2,this)" style="cursor:pointer">${e.m?e.m[2]:0}</div></div>
        <div class="expand-field"><div class="expand-label">Hours</div><div class="expand-value actual-col" onclick="editHours(${e.id},this)" style="cursor:pointer">${e.hours||0}h</div></div>
        <div class="expand-next"><div class="expand-label">Next Step</div><div class="expand-next-text" onclick="event.stopPropagation();editNext(${e.id},this)">${e.next||'<span class="ph">What to do next sprint...</span>'}</div></div>
        <div class="expand-actions">
          <span class="expand-actions-label">Verdict</span>
          ${['Keep going','Change variables','Close, iterate','Stop'].map(v=>`<div class="vbtn v-${v==='Keep going'?'keep':v==='Change variables'?'change':v==='Close, iterate'?'close':'stop'} ${e.verdict===v?'active':''}" onclick="event.stopPropagation();setVerdict(${e.id},'${v}')">${v}</div>`).join('')}
        </div>
      </div>
    </td></tr>`;
  });

  html+=`</table>`;

  if(stopped.length){
    html+=`<div class="stopped-toggle" onclick="document.getElementById('stopped-${activeFlow}').style.display=document.getElementById('stopped-${activeFlow}').style.display==='none'?'block':'none'">Stopped · ${stopped.length} ▾</div>
    <div id="stopped-${activeFlow}" style="display:none"><table class="sprint-table" style="opacity:0.5">
    ${stopped.map(e=>`<tr><td class="exp-name-col">${e.name}</td><td style="font-size:12px;color:var(--text-3)">${e.started||'—'}</td><td class="target-col">${e.target}</td><td class="actual-col pending">—</td><td class="verdict-col"><span class="verdict stop">Stop</span></td></tr>`).join('')}
    </table></div>`;
  }

  html+=`</div>`;
  document.getElementById('board').innerHTML=html;
}

function toggleExp(id){document.getElementById('expand-'+id).classList.toggle('open');}

function cycleVerdict(id){
  const exps=load();const e=exps.find(x=>x.id===id);
  const opts=['','Keep going','Change variables','Close, iterate','Stop'];
  const idx=opts.indexOf(e.verdict);
  e.verdict=opts[(idx+1)%opts.length];
  save(exps);flash();render();
}

function setVerdict(id,v){const exps=load();exps.find(x=>x.id===id).verdict=v;save(exps);flash();render();}

function editActual(id,el){
  const exps=load();const e=exps.find(x=>x.id===id);const info=CH[e.ch];
  const val=prompt(`${e.name} — enter ${info.cols[1]} count:`,e.m?e.m[1]:0);
  if(val===null)return;
  if(!e.m)e.m=[0,0,0];
  e.m[1]=parseInt(val)||0;
  save(exps);flash();render();
}

function editM(id,idx,el){
  const exps=load();const e=exps.find(x=>x.id===id);const info=CH[e.ch];
  const val=prompt(`${e.name} — ${info.cols[idx]}:`,e.m?e.m[idx]:0);
  if(val===null)return;
  if(!e.m)e.m=[0,0,0];
  e.m[idx]=parseInt(val)||0;
  save(exps);flash();render();
}

function editHours(id,el){
  const exps=load();const e=exps.find(x=>x.id===id);
  const val=prompt(`${e.name} — hours:`,e.hours||0);
  if(val===null)return;
  e.hours=parseFloat(val)||0;
  save(exps);flash();render();
}

function editDate(id,el){
  const exps=load();const e=exps.find(x=>x.id===id);
  const input=document.createElement('input');
  input.type='date';
  input.style.cssText='font-size:12px;font-family:DM Sans,sans-serif;border:1.5px solid var(--accent);border-radius:3px;padding:2px 4px;outline:none;background:var(--bg);color:var(--text);';
  el.innerHTML='';el.appendChild(input);input.focus();
  function c(){
    if(input.value){
      const d=new Date(input.value+'T00:00:00');
      const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
      e.started=mo+' '+d.getDate();
    }
    save(exps);flash();render();
  }
  input.addEventListener('change',c);
  input.addEventListener('blur',c);
}

function editNext(id,el){
  const exps=load();const e=exps.find(x=>x.id===id);
  const input=document.createElement('input');input.type='text';input.value=e.next||'';input.placeholder='What to change next sprint...';
  el.innerHTML='';el.appendChild(input);input.focus();
  function c(){e.next=input.value;save(exps);flash();render();}
  input.addEventListener('blur',c);input.addEventListener('keydown',ev=>{if(ev.key==='Enter')c();});
}

// Chat
const SM={'linkedin':{ch:'linkedin',name:'LinkedIn Outbound',target:'>20% reply',targetNum:0.20},'sales nav':{ch:'linkedin',name:'Sales Nav Outbound',target:'>25% accept',targetNum:0.25},'reddit':{ch:'reddit',name:'Reddit Listening',target:'>20% reply-back',targetNum:0.20},'twitter':{ch:'twitter',name:'Twitter Outreach',target:'>15% engagement',targetNum:0.15},'event':{ch:'events',name:'Event Marketing',target:'>5 signups',targetNum:0.50},'coffee':{ch:'events',name:'Coffee Events',target:'>50% conv',targetNum:0.50},'email':{ch:'email',name:'Email Campaign',target:'>40% open',targetNum:0.40},'churn':{ch:'product',name:'Win-Back',target:'>5% reactivation',targetNum:0.05},'seo':{ch:'content',name:'SEO Sprint',target:'>2% CTR',targetNum:0.02},'content':{ch:'content',name:'Content Push',target:'>50 imp/post',targetNum:0.01},'slack':{ch:'product',name:'Slack Broadcast',target:'>15% engagement',targetNum:0.15},'in-app':{ch:'product',name:'In-App Nudges',target:'>15% adoption',targetNum:0.15},'gift':{ch:'email',name:'Gift Outreach',target:'>35% response',targetNum:0.35},'influencer':{ch:'linkedin',name:'Influencer Monitor',target:'>20% DM reply',targetNum:0.20},'warm':{ch:'linkedin',name:'Warm Intros',target:'>40% meeting',targetNum:0.40},'referral':{ch:'linkedin',name:'Referral Posts',target:'>30% DM reply',targetNum:0.30},'scrape':{ch:'linkedin',name:'Post Engagers',target:'>3x vs cold',targetNum:0.20},'docs':{ch:'product',name:'Docs Rewrite',target:'>30% fewer tickets',targetNum:0.30}};

function suggest(idea){const l=idea.toLowerCase();let b=null,bs=0;for(const[k,s]of Object.entries(SM)){if(l.includes(k)&&k.length>bs){b=s;bs=k.length;}}return b||{ch:'linkedin',name:idea.split(' ').slice(0,3).join(' '),target:'TBD',targetNum:0};}

let cp=0,cd={};
function openModal(){cp=0;cd={};document.getElementById('modal').classList.add('open');document.getElementById('chat-msgs').innerHTML='';resetCI();setTimeout(()=>{addBot("What's the idea?");document.getElementById('chat-in').focus();},200);}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function resetCI(){document.getElementById('chat-input').innerHTML=`<input type="text" id="chat-in" placeholder="Type here..." onkeydown="if(event.key==='Enter')sendMsg()"><button class="skip" onclick="skipStep()">Skip</button><button onclick="sendMsg()">Send</button>`;}
function addBot(t){const d=document.createElement('div');d.className='msg bot';d.innerHTML=t;document.getElementById('chat-msgs').appendChild(d);document.getElementById('chat-msgs').scrollTop=99999;}
function addUser(t){const d=document.createElement('div');d.className='msg user';d.textContent=t;document.getElementById('chat-msgs').appendChild(d);document.getElementById('chat-msgs').scrollTop=99999;}

function sendMsg(){
  const input=document.getElementById('chat-in');const v=input.value.trim();if(!v)return;
  addUser(v);input.value='';
  if(cp===0){cd.idea=v;cp=1;setTimeout(()=>{addBot("What's the goal?");input.focus();},300);}
  else if(cp===1){
    cd.goal=v==='idk'||v==='not sure'?'':v;cp=2;
    const s=suggest(cd.idea);Object.assign(cd,s);
    setTimeout(()=>{
      addBot("Here's what I'd suggest:");
      setTimeout(()=>{
        const d=document.createElement('div');d.className='msg summary';
        d.innerHTML=`<div style="font-weight:500;margin-bottom:6px">Suggested:</div><div class="sl">Name</div><div class="sv">${cd.name}</div><div class="sl">Platform</div><div class="sv">${(CH[cd.ch]||{}).label||cd.ch}</div><div class="sl">Target</div><div class="sv">${cd.target}</div>`;
        document.getElementById('chat-msgs').appendChild(d);document.getElementById('chat-msgs').scrollTop=99999;
        setTimeout(()=>{addBot("Look good?");document.getElementById('chat-input').innerHTML=`
          <button onclick="closeModal()" style="flex:1;padding:8px;border-radius:4px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--rule);background:transparent;color:var(--text-2);font-family:'DM Sans',sans-serif">Cancel</button>
          <button onclick="confirmAdd()" style="flex:2;padding:8px 14px;border-radius:4px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:var(--green);color:#faf8f5;font-family:'DM Sans',sans-serif">Add to Sprint</button>`;},400);
      },300);
    },300);
  }
}
function skipStep(){if(cp===0){cd.idea='';cp=1;addBot("What's the goal?");}else{cd.goal='';cp=2;const s=suggest(cd.idea||'');Object.assign(cd,s);sendMsg();}}

function confirmAdd(){
  const exps=load(),id=exps.reduce((m,e)=>Math.max(m,e.id),0)+1;
  const now=new Date();const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][now.getMonth()];
  exps.push({id,ch:cd.ch||'linkedin',name:cd.name,started:mo+' '+now.getDate(),target:cd.target||'TBD',targetNum:cd.targetNum||0,idea:cd.idea||'',m:[0,0,0],hours:0,verdict:'',next:''});
  save(exps);flash();closeModal();activeFlow=cd.ch||'linkedin';render();
}

document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
render();
</script>
</body>
</html>
