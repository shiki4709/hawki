services:
  - type: web
    name: hawki
    runtime: python
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: LI_AT
        sync: false
      - key: LI_JSESSIONID
        sync: false
      - key: FLASK_DEBUG
        value: false
